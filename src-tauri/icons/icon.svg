<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- >_ prompt -->
  <text
    x="240"
    y="640"
    font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace"
    font-size="520"
    font-weight="700"
    fill="#60a5fa"
    letter-spacing="-20"
  >&gt;_</text>

  <!-- AI spark - large -->
  <circle cx="810" cy="200" r="36" fill="#f59e0b"/>
  <!-- AI spark - medium -->
  <circle cx="880" cy="290" r="24" fill="#f59e0b" opacity="0.7"/>
  <!-- AI spark - small -->
  <circle cx="740" cy="140" r="16" fill="#f59e0b" opacity="0.5"/>
  <!-- AI spark - tiny -->
  <circle cx="860" cy="170" r="10" fill="#f59e0b" opacity="0.35"/>
</svg>
