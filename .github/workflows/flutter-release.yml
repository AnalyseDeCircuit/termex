name: Flutter Release

on:
  push:
    tags:
      - 'v0.4[0-9].*'
      - 'v0.5[0-9].*'
      - 'v1.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.49.0)'
        required: true
      channel:
        description: 'Release channel'
        required: true
        default: 'stable'
        type: choice
        options: [stable, beta]

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
            rust-target: aarch64-apple-darwin
          - arch: x64
            runner: macos-13
            rust-target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Pre-build Rust bridge with sentinel
        env:
          CARGOKIT_CARGO_FEATURES: sentinel
        run: cargo build --release -p termex-flutter-bridge --features sentinel --target ${{ matrix.rust-target }}

      - name: Build DMG
        working-directory: app
        env:
          CARGOKIT_CARGO_FEATURES: sentinel
        run: flutter_distributor package --platform macos --targets dmg --flutter-build-args "dart-define=SENTINEL=true"

      - name: Sign + Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          SIGN_ID: ${{ secrets.SIGN_ID }}
          DMG_PATH: app/release/stable/*.dmg
        run: bash scripts/sign-macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.arch }}
          path: app/release/stable/*.dmg

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install OpenSSL (required by SQLCipher)
        shell: pwsh
        run: |
          vcpkg install openssl:x64-windows-static-md
          echo "OPENSSL_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "OPENSSL_STATIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Install Flutter dependencies
        working-directory: app
        shell: pwsh
        run: flutter pub get

      - name: Pre-build Rust bridge with sentinel
        shell: pwsh
        env:
          CARGOKIT_CARGO_FEATURES: sentinel
        run: cargo build --release -p termex-flutter-bridge --features sentinel

      - name: Build MSIX
        working-directory: app
        shell: pwsh
        env:
          CARGOKIT_CARGO_FEATURES: sentinel
        run: flutter_distributor package --platform windows --targets msix --flutter-build-args "dart-define=SENTINEL=true"

      - name: Sign MSIX
        shell: pwsh
        env:
          CERT_THUMBPRINT: ${{ secrets.WINDOWS_CERT_THUMBPRINT }}
          MSIX_PATH: app/release/stable/termex.msix
        run: .\scripts\sign-windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: app/release/stable/*.msix

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 libgtk-3-dev ninja-build \
            libayatana-appindicator3-dev \
            rpm dpkg-dev

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Pre-build Rust bridge with sentinel
        env:
          CARGOKIT_CARGO_FEATURES: sentinel
        run: cargo build --release -p termex-flutter-bridge --features sentinel

      - name: Build AppImage + deb + rpm
        working-directory: app
        env:
          CARGOKIT_CARGO_FEATURES: sentinel
        run: flutter_distributor package --platform linux --targets appimage,deb,rpm --flutter-build-args "dart-define=SENTINEL=true"

      - name: GPG import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Sign AppImage
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          APPIMAGE_PATH: app/release/stable/termex.AppImage
        run: bash scripts/sign-linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            app/release/stable/*.AppImage
            app/release/stable/*.AppImage.sig
            app/release/stable/*.deb
            app/release/stable/*.rpm

  release:
    name: Publish Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release/

      - name: Flatten artifacts
        run: |
          mkdir -p release-flat
          find release -type f \( -name "*.dmg" -o -name "*.msix" -o -name "*.AppImage*" -o -name "*.deb" -o -name "*.rpm" \) -exec cp {} release-flat/ \;
          ls -la release-flat/

      - name: Generate SHA256SUMS
        working-directory: release-flat
        run: shasum -a 256 * > "termex-${GITHUB_REF_NAME#v}-SHA256SUMS.txt"

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: release-flat/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') }}

      - name: Update appcast.xml
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CDN_AWS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CDN_AWS_SECRET }}
          ASSETS_DIR: release-flat
          CHANNEL: ${{ contains(github.ref_name, '-beta') && 'beta' || 'stable' }}
        run: bash scripts/update-appcast.sh "${GITHUB_REF_NAME#v}"

      - name: Deploy to CDN
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CDN_AWS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CDN_AWS_SECRET }}
          ASSETS_DIR: release-flat
          VERSION: ${{ github.ref_name }}
          CHANNEL: ${{ contains(github.ref_name, '-beta') && 'beta' || 'stable' }}
        run: VERSION="${GITHUB_REF_NAME#v}" bash scripts/deploy-to-cdn.sh
